<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat Selector</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Cat Selector</div>
        <div id="user-greeting" class="greeting"></div>
        <div class="nav-links">
            <a href="#">Explorer</a>
            <button class="login-btn">Login</button>
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>The Feline Encyclopedia</h1>
            <p>Uncover the history, temperament, and beauty of cat breeds.</p>
        </div>
    </header>

    <section class="controls">
        <div class="search-box">
            <label for="breed-select">Choose a Breed:</label>
            <select id="breed-select">
                <option value="">-- Select a Breed --</option>
            </select>
            <button class="action-btn">View Info</button>
            <button id="random-btn" class="action-btn" style="background-color: var(--slate-grey);">Surprise Me! 🐾</button>
        </div>
    </section>

    <main id="data-container" class="main-content">
        <div class="static-placeholder">
            <p>Select a breed above to see the information card.</p>
        </div>
    </main>

    <section id="favorites-section">
        <h2>Your Saved Favorites</h2>
        <div id="favorites-grid"></div>
    </section>

    <div id="login-modal">
        <div class="modal-content">
            <h2>User Login</h2>
            <p>Enter a username to save your favorites.</p>
            <input type="text" id="username-input" placeholder="Username...">
            <button id="confirm-login" class="action-btn">Enter</button>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 Purr-suit of Happiness</p>
    </footer>

    <script src="index.js"></script>
</body>
</html>
